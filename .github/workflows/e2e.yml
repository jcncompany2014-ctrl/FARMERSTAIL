name: E2E (Playwright)

# 수동 실행 전용 — 자동 트리거 OFF.
#
# 왜 manual 만
# ───────────
# 첫 자동 실행 (placeholder secret) 에서 일부 spec 이 떨어졌다. Supabase
# 실 URL/anon key 가 없으면 인증 redirect / RLS 응답이 production 과 달라
# auth-required spec 들이 실패. 매 push 마다 실패 메일이 오는 noise 가
# 솔로 운영자에게 무가치하므로 자동 트리거를 일시 OFF.
#
# 재활성 절차
# ─────────
#   1) repo Settings → Secrets and variables → Actions
#   2) 다음 secret 등록:
#      - NEXT_PUBLIC_SUPABASE_URL  (prod 또는 stage URL)
#      - NEXT_PUBLIC_SUPABASE_ANON_KEY
#      - NEXT_PUBLIC_SITE_URL (선택)
#   3) 아래 `on:` 에 push/pull_request 트리거 복원.
#
# 수동 실행
# ────────
#   Actions 탭 → E2E (Playwright) → Run workflow → main branch 선택

on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: chromium · mobile-chrome
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm deps
        run: npm ci

      # Build / 시작 시 require 되는 env. secret 없으면 dummy 로 채워서
      # 빌드 통과 시킴. 실제 backend call 을 하는 spec 은 secret 등록 후
      # 활성화 — 현재는 정적/인증 redirect 만 검증.
      - name: Set env defaults
        run: |
          : "${NEXT_PUBLIC_SUPABASE_URL:=https://placeholder.supabase.co}"
          : "${NEXT_PUBLIC_SUPABASE_ANON_KEY:=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.placeholder}"
          : "${NEXT_PUBLIC_SITE_URL:=http://localhost:3100}"
          echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL" >> $GITHUB_ENV
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # PLAYWRIGHT_USE_BUILD 는 CI 환경에서 playwright.config.ts 가 자동으로
      # true 로 두고 build+start 로 돌린다 — production binary 로 검증.
      - name: Run Playwright tests
        run: npx playwright test --project=chromium --project=mobile-chrome

      - name: Upload playwright-report (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
