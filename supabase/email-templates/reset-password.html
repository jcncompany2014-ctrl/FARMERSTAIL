<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>비밀번호 재설정</title>
</head>
<body style="margin:0;padding:0;background:#F5F0E6;font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#1E1A14;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#F5F0E6;padding:32px 16px;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#FFFFFF;border-radius:16px;overflow:hidden;border:1px solid #E8E2D5;">
        <tr>
          <td style="padding:32px 28px 24px;">
            <div style="font-size:10px;font-weight:700;letter-spacing:0.2em;color:#C66B3D;text-transform:uppercase;">Password · 비밀번호 재설정</div>
            <h1 style="margin:8px 0 0;font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1.3;color:#1E1A14;">비밀번호를 다시 설정해주세요</h1>
            <p style="margin:18px 0 0;font-size:14px;line-height:1.7;color:#3A3530;">
              요청하신 계정 ({{ .Email }}) 의 비밀번호 재설정 링크예요. 링크는 <strong>1시간 후 만료</strong>됩니다.
            </p>
            <div style="margin:24px 0 8px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;background:#1E1A14;color:#FFFFFF;text-decoration:none;border-radius:999px;font-size:14px;font-weight:700;">비밀번호 재설정</a>
            </div>
            <p style="margin:18px 0 0;font-size:12px;line-height:1.7;color:#7A7165;">
              버튼이 작동하지 않으면 이 주소를 복사해서 브라우저에 붙여 넣어주세요:<br>
              <span style="word-break:break-all;color:#C66B3D;">{{ .ConfirmationURL }}</span>
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:18px 28px;border-top:1px solid #E8E2D5;background:#FAF6EC;">
            <p style="margin:0;font-size:11px;line-height:1.6;color:#7A7165;">
              본 메일은 비밀번호 재설정 요청에 의한 거래성 이메일이에요. 본인이 요청하지 않았다면 이 메일을 무시해주세요. 누군가가 계정 비밀번호 변경을 시도했지만 변경되지 않았어요.<br>
              파머스테일 · 정성스러운 화식 펫푸드
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
